name: Windows

on:
  push:
    branches: [ win_workflow ]
    tags:
      - 'v*'
      - '*.*.*'
  pull_request:
    branches: [ win_workflow ]

permissions:
  contents: write

  
jobs:
  build:
    runs-on: windows-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
    - name: Checkout Bobcat repository
      uses: actions/checkout@v3
      with:
        path: Bobcat
        fetch-depth: 0

    - name: Download U++ uppsrc
      run: |
        Invoke-WebRequest -Uri "https://github.com/ultimatepp/ultimatepp/releases/download/v2026.1/uppsrc-18468.tar.gz" -OutFile "uppsrc.tar.gz"

    - name: Download U++ umk for Windows
      run: |
        Invoke-WebRequest -Uri "https://github.com/ultimatepp/ultimatepp/releases/download/v2026.1/umk-win-18468.7z" -OutFile "umk-win.7z"

    - name: Extract uppsrc
      run: |
        mkdir -p 3p
        tar -xf uppsrc.tar.gz -C 3p
        
    - name: Extract umk
      run: |
        7z x umk-win.7z -o3p
    
    - name: Check umk.exe dependencies
      run: |
        Write-Host "Checking umk.exe and its dependencies..."
        Write-Host "umk.exe location: 3p\umk\umk.exe"
        
        if (Test-Path "3p\umk\umk.exe") {
          Write-Host "umk.exe found"
          Get-Item "3p\umk\umk.exe" | Format-List
        } else {
          Write-Error "umk.exe not found!"
          exit 1
        }
        
        Write-Host "`nListing files in 3p\umk:"
        Get-ChildItem "3p\umk" -Recurse -File | Select-Object FullName
  
    - name: Build Bobcat
      working-directory: Bobcat
      run: |
        New-Item -ItemType Directory -Force -Path out
        
        Write-Host "Building Bobcat..."
        Write-Host "Current directory: $PWD"
        
        $output = & ..\3p\umk\umk.exe .\,..\3p\uppsrc Bobcat ..\3p\umk\CLANG.bm --hub-dir ..\3p\hub -brh +GUI,WIN64,WIN10 out\Bobcat.exe 2>&1
        $exitCode = $LASTEXITCODE
        
        Write-Host "umk.exe output:"
        Write-Host $output
        Write-Host "Exit code: $exitCode"
        
        if ($exitCode -ne 0) {
          Write-Error "umk.exe failed with exit code $exitCode"
          exit $exitCode
        }
        
        if (-not (Test-Path "out\Bobcat.exe")) {
          Write-Error "Build failed - Bobcat.exe not found"
          Write-Host "Contents of output directory:"
          Get-ChildItem out -Recurse -ErrorAction SilentlyContinue
          exit 1
        }
        
        Write-Host "Build successful - Bobcat.exe created"

    - name: Build PtyAgent
      working-directory: Bobcat
      run: |
        Write-Host "Building PtyAgent..."
        
        $output = & ..\3p\umk\umk.exe ..\3p\hub\Terminal,..\3p\uppsrc PtyAgent ..\3p\umk\CLANG.bm --hub-dir ..\3p\hub -br +WIN64 out\PtyAgent.exe 2>&1
        $exitCode = $LASTEXITCODE
        
        Write-Host "umk.exe output:"
        Write-Host $output
        Write-Host "Exit code: $exitCode"
        
        if ($exitCode -ne 0) {
          Write-Error "umk.exe failed with exit code $exitCode"
          exit $exitCode
        }
        
        if (-not (Test-Path "out\PtyAgent.exe")) {
          Write-Error "Build failed - PtyAgent.exe not found"
          Write-Host "Contents of output directory:"
          Get-ChildItem out -Recurse -ErrorAction SilentlyContinue
          exit 1
        }
        
        Write-Host "Build successful - PtyAgent.exe created"

    - name: Download Bobcat assets
      uses: actions/checkout@v3
      with:
        repository: ismail-yilmaz/Bobcat-Assets
        path: bobcat-assets

    - name: Copy binaries from the assets repo
      run: |
        cp bobcat-assets/OpenConsole.exe Bobcat/out/
        cp bobcat-assets/conpty.dll Bobcat/out/
        
    # Upload artifacts for main branch builds

    - name: Archive binaries
      if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: bobcat-win64
        path: Bobcat/out/*

    # Release handling
    
    - name: Get the version
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      shell: bash

    - name: Compress binaries
      if: startsWith(github.ref, 'refs/tags/')
      working-directory: Bobcat
      run: |
        Compress-Archive -Path out\* -DestinationPath "bobcat-${{ env.VERSION }}-win64.zip"

    - name: Create GitHub release & upload asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        release_name: Release ${{ env.VERSION }}
        draft: false
        prerelease: false
        files: Bobcat/bobcat-${{ env.VERSION }}-win64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
